name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Firebase environment
        shell: bash
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
          VITE_PUSH_SERVER_URL: ${{ secrets.VITE_PUSH_SERVER_URL }}
          VITE_INITIAL_ADMIN_EMAILS: ${{ secrets.VITE_INITIAL_ADMIN_EMAILS }}
        run: |
          missing_required=0
          for name in \
            VITE_FIREBASE_API_KEY \
            VITE_FIREBASE_AUTH_DOMAIN \
            VITE_FIREBASE_PROJECT_ID \
            VITE_FIREBASE_STORAGE_BUCKET \
            VITE_FIREBASE_MESSAGING_SENDER_ID \
            VITE_FIREBASE_APP_ID
          do
            if [ -n "${!name:-}" ]; then
              echo "$name: presente"
            else
              echo "::warning::$name falta"
              missing_required=1
            fi
          done

          if [ -n "${VITE_FIREBASE_MEASUREMENT_ID:-}" ]; then
            echo "VITE_FIREBASE_MEASUREMENT_ID: presente"
          else
            echo "::notice::VITE_FIREBASE_MEASUREMENT_ID falta; Google Sign-In no depende de Analytics."
          fi

          if [ -n "${VITE_FIREBASE_VAPID_KEY:-}" ]; then
            echo "VITE_FIREBASE_VAPID_KEY: presente"
          else
            echo "::notice::VITE_FIREBASE_VAPID_KEY falta; las notificaciones dentro de la app siguen funcionando."
          fi

          if [ -n "${VITE_FIREBASE_APPCHECK_SITE_KEY:-}" ]; then
            echo "VITE_FIREBASE_APPCHECK_SITE_KEY: presente"
          else
            echo "::notice::VITE_FIREBASE_APPCHECK_SITE_KEY falta; App Check aun no se inicializara en web."
          fi

          if [ -n "${VITE_PUSH_SERVER_URL:-}" ]; then
            echo "VITE_PUSH_SERVER_URL: presente"
          else
            echo "::notice::VITE_PUSH_SERVER_URL falta; push externo queda desactivado."
          fi

          if [ -n "${VITE_INITIAL_ADMIN_EMAILS:-}" ]; then
            echo "VITE_INITIAL_ADMIN_EMAILS: presente"
          else
            echo "::notice::VITE_INITIAL_ADMIN_EMAILS falta; solo es necesario para bootstrap de admins iniciales."
          fi

          if [ "$missing_required" -ne 0 ]; then
            echo "::error::Faltan secrets VITE_FIREBASE_* requeridos; no se publicara una app sin Firebase."
            exit 1
          fi

      - name: Build
        env:
          PAGES_CUSTOM_DOMAIN: ${{ secrets.PAGES_CUSTOM_DOMAIN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
          VITE_PUSH_SERVER_URL: ${{ secrets.VITE_PUSH_SERVER_URL }}
          VITE_INITIAL_ADMIN_EMAILS: ${{ secrets.VITE_INITIAL_ADMIN_EMAILS }}
          VITE_ENABLE_DEMO_MODE: ${{ secrets.VITE_ENABLE_DEMO_MODE }}
        run: npm run build

      - name: Prepare custom domain
        shell: bash
        env:
          PAGES_CUSTOM_DOMAIN: ${{ secrets.PAGES_CUSTOM_DOMAIN }}
        run: |
          if [ -n "${PAGES_CUSTOM_DOMAIN:-}" ]; then
            echo "$PAGES_CUSTOM_DOMAIN" > dist/CNAME
            echo "Dominio propio configurado para GitHub Pages: $PAGES_CUSTOM_DOMAIN"
          else
            echo "Sin dominio propio; se conserva /roca-eterna-musica/."
          fi

      - name: Verify public assets copied
        shell: bash
        run: |
          test -d dist/pdfs
          test -d dist/icons
          test -f "dist/pdfs/Glorificate.pdf"
          test -f "dist/icons/roca-eterna-logo-light.png"
          test -f "dist/icons/roca-eterna-logo-dark.png"
          test -f "dist/icons/pwa-192.png"
          test -f "dist/icons/pwa-512.png"
          test -f "dist/icons/pwa-maskable-192.png"
          test -f "dist/icons/pwa-maskable-512.png"
          test -f "dist/icons/apple-touch-icon.png"
          test -f "dist/favicon.png"

      - name: Publish dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
